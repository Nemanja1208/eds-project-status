<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>EDS Platform — Project Status</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --brand-primary: #1a56db;
                --brand-accent: #7c3aed;
                --text-on-dark: #f8fafc;
                --text-muted: rgba(248, 250, 252, 0.72);
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            .staticrypt-html, .staticrypt-body {
                height: 100%;
                min-height: 100vh;
            }

            .staticrypt-body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--text-on-dark);
                background: #0f172a;
            }

            .staticrypt-content {
                min-height: 100vh;
                position: relative;
                background:
                    radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.18) 0%, transparent 55%),
                    radial-gradient(circle at 80% 20%, rgba(26, 86, 219, 0.22) 0%, transparent 55%),
                    linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1a56db 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 48px 20px;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 440px;
                margin: 0;
                padding: 0;
                animation: eds-fade 0.6s ease both;
            }

            @keyframes eds-fade {
                from { opacity: 0; transform: translateY(12px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .eds-logos {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 20px;
                margin-bottom: 28px;
            }

            .eds-logos img {
                height: 48px;
                width: auto;
                filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35));
            }

            .eds-logos .eds-logo-divider {
                width: 1px;
                height: 32px;
                background: rgba(255, 255, 255, 0.25);
            }

            .eds-badge {
                display: inline-block;
                text-align: center;
                width: 100%;
                margin-bottom: 14px;
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--text-muted);
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 16px;
                padding: 32px 32px 28px;
                box-shadow:
                    0 20px 60px rgba(0, 0, 0, 0.35),
                    0 2px 6px rgba(0, 0, 0, 0.15);
            }

            .staticrypt-instructions {
                text-align: center;
                margin-bottom: 22px;
            }

            .staticrypt-title {
                font-size: 1.4em;
                font-weight: 600;
                margin-bottom: 8px;
                color: var(--text-on-dark);
            }

            .staticrypt-instructions p:last-child {
                font-size: 0.95em;
                color: var(--text-muted);
                line-height: 1.5;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.12);
                margin: 0 0 22px 0;
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(15, 23, 42, 0.55);
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 10px;
                margin: 0 0 14px;
                transition: border-color 0.15s ease, box-shadow 0.15s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: rgba(255, 255, 255, 0.45);
                box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.35);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                font-size: 15px;
                padding: 14px 44px 14px 16px;
                width: 100%;
                color: var(--text-on-dark);
                letter-spacing: 0.02em;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: rgba(248, 250, 252, 0.45);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.65;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.15s ease;
            }

            .staticrypt-toggle-password-visibility:hover { opacity: 0.95; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13px;
                color: var(--text-muted);
                margin-bottom: 18px;
                cursor: pointer;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.15);
                margin: 0;
                accent-color: var(--brand-primary);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-weight: 600;
                font-size: 13px;
                outline: 0;
                width: 100%;
                border: 0;
                padding: 14px;
                color: #ffffff;
                cursor: pointer;
                border-radius: 10px;
                background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);
                box-shadow: 0 6px 16px rgba(26, 86, 219, 0.45);
                transition: transform 0.1s ease, box-shadow 0.15s ease, filter 0.15s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                filter: brightness(108%);
                box-shadow: 0 8px 22px rgba(26, 86, 219, 0.55);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(1px);
                filter: brightness(96%);
            }

            .staticrypt-footer {
                margin-top: 22px;
                text-align: center;
                font-size: 11px;
                color: rgba(248, 250, 252, 0.45);
                letter-spacing: 0.04em;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1a56db 100%);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(255, 255, 255, 0.35);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form { padding: 26px 22px 22px; }
                .eds-logos img { height: 40px; }
            }
        </style>
    </head>

                        <input type="submit" class="staticrypt-decrypt-button" value="Unlock Dashboard" />
